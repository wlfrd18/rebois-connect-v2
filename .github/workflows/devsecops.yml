name: DevSecOps Pipeline

# Déclenché à chaque push et pull request sur main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Analyse statique sécurité ─────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit safety

      # Bandit — analyse statique du code Python
      # Détecte : injections SQL, secrets hardcodés, fonctions dangereuses
      - name: Run Bandit (SAST)
        run: |
          bandit -r backend/ \
            --exclude backend/venv,backend/*/migrations \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r backend/ \
            --exclude backend/venv,backend/*/migrations \
            --severity-level medium \
            --confidence-level medium

      # Safety — vérifie les dépendances Python contre la base CVE
      # CVE = Common Vulnerabilities and Exposures
      - name: Run Safety (dependency check)
        run: |
          safety check \
            --file backend/requirements.txt \
            --output text
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ── Job 2 : Tests Django ───────────────────────────────────
  test:
    name: Django Tests
    runs-on: ubuntu-latest
    needs: security-scan

    services:
      # PostgreSQL de test — isolé, détruit après le job
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rebois_test
          POSTGRES_USER: rebois_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run Django tests
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production-use"
          DEBUG: "True"
          DB_NAME: rebois_test
          DB_USER: rebois_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_HOSTS: localhost,127.0.0.1
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: |
          cd backend
          DJANGO_SETTINGS_MODULE=config.settings_test python manage.py test --verbosity=2

  # ── Job 3 : Build Docker ───────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag rebois-connect-backend:${{ github.sha }} \
            backend/

      # Trivy — scan de vulnérabilités dans l'image Docker
      # Vérifie les paquets OS et les librairies Python dans l'image
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rebois-connect-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  # ── Job 4 : Résumé sécurité ────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [security-scan, test, docker-build]
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "## DevSecOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit SAST | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Django Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
